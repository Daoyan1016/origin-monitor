<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鲸鱼 LGNS 监控台</title>
  <meta name="description" content="LGNS 监控台工程化版本，包含 Treasury、DAI 池、交易量分析、大户追踪与风险预警。">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">LGNS Monitor</p>
        <h1 id="pageTitle">鲸鱼 LGNS 监控台</h1>
        <p id="pageSubtitle" class="subtitle">Treasury · DAI池 · 交易量 · 大户追踪 · 预警</p>
      </div>
      <div class="meta-panel">
        <span class="meta-label">数据源</span>
        <strong id="dataSourceBadge" class="status-badge neutral">Mock</strong>
        <span class="meta-label">最后更新</span>
        <strong id="lastUpdated">--</strong>
      </div>
    </header>

    <main id="app" class="dashboard" aria-live="polite">
      <section class="loading-panel">
        <div class="loading-spinner" aria-hidden="true"></div>
        <div>
          <h2>页面初始化中</h2>
          <p>正在加载监控面板和数据结构...</p>
        </div>
      </section>
    </main>
  </div>

  <template id="empty-state-template">
    <div class="empty-state">
      <p>当前没有可展示的数据。</p>
    </div>
  </template>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
